name: Install Daml
description: Install Daml

inputs:
  sdk_version:
    required: false
    description: The version of the Daml SDK to install (if not provided, installs latest stable)
    type: string

runs:
  using: "composite"
  steps:
    - name: Install Java (Temurin 21)
      uses: actions/setup-java@v4
      with:
        distribution: "temurin"
        java-version: "21"
    - name: Set JAVA_HOME
      run: |
        echo "JAVA_HOME=/usr/lib/jvm/temurin-21-jdk-amd64" >> $GITHUB_ENV
      shell: bash
    - name: Download and Install DAML SDK
      run: |
        if [ -n "$SDK_VERSION" ]; then
          gh release download v$SDK_VERSION --repo digital-asset/daml --pattern "daml-sdk*linux-x86_64.tar.gz" --output daml-sdk.tar.gz
          mkdir -p daml-sdk
          tar xzf daml-sdk.tar.gz -C daml-sdk --strip-components=1
          cd daml-sdk
          ./install.sh --install-with-custom-version $SDK_VERSION
        else
          curl -sSL https://get.daml.com/ | sh
        fi
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        SDK_VERSION: ${{ inputs.sdk_version }}
    - name: Add Daml Installation to PATH
      run: |
        echo "$HOME/.daml/bin" >> "$GITHUB_PATH"
      shell: bash
